apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-web
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/repo.git
    targetRevision: HEAD
    path: kustomization/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
